<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G10 Enquiry System</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:10px;
    font-family:Arial,sans-serif;
    background:#f1f5f9;
    font-size:13px;
}

.container{
    max-width:100%;
    margin:auto;
}

h1{
    text-align:center;
    color:#0f172a;
    margin-bottom:12px;
    font-size:22px;
}

.form-box,
.table-box{
    background:#fff;
    padding:12px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    margin-bottom:15px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:10px;
}

label{
    font-size:12px;
    font-weight:bold;
    display:block;
    margin-bottom:4px;
}

input,
select,
textarea{
    width:100%;
    padding:7px 8px;
    border:1px solid #cbd5e1;
    border-radius:6px;
    font-size:12px;
}

textarea{
    resize:vertical;
}

button{
    border:none;
    border-radius:5px;
    padding:5px 8px;
    cursor:pointer;
    color:white;
    font-size:11px;
    font-weight:bold;
}

.save-btn{
    background:#2563eb;
}

.save-btn:hover{
    background:#1d4ed8;
}

.success-btn{
    background:#16a34a;
    margin-bottom:3px;
}

.success-btn:hover{
    background:#15803d;
}

.not-btn{
    background:#f59e0b;
    margin-bottom:3px;
}

.not-btn:hover{
    background:#d97706;
}

.delete-btn{
    background:#dc2626;
}

.delete-btn:hover{
    background:#b91c1c;
}
.edit-btn{
    background:#0ea5e9;
    margin-bottom:3px;
}

.edit-btn:hover{
    background:#0284c7;
}

.status-success{
    color:#16a34a;
    font-weight:bold;
    font-size:11px;
}

.status-not{
    color:#dc2626;
    font-weight:bold;
    font-size:11px;
}

.status-pending{
    color:#f59e0b;
    font-weight:bold;
    font-size:11px;
}

.search-box{
    margin-bottom:12px;
}

.table-wrapper{
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

th,
td{
    border-bottom:1px solid #e2e8f0;
    padding:4px;
    text-align:left;
    font-size:10px;
    white-space:normal;
    word-break:break-word;
    line-height:1.2;
}
td:nth-child(5){
    max-width:140px;
}

th{
    background:#f8fafc;
    position:sticky;
    top:0;
}




@media(max-width:600px){

body{
    padding:5px;
}

h1{
    font-size:18px;
}

.form-box,
.table-box{
    padding:8px;
}

.grid{
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:8px;
}

input,
select,
textarea{
    font-size:11px;
    padding:6px;
}

th,
td{
    font-size:8px;
    padding:2px;
    line-height:1.1;
}

button{
    width:100%;
    font-size:8px;
    padding:2px;
    margin-bottom:2px;
}

small{
    font-size:7px;
}

td:nth-child(1){
    width:28%;
}

td:nth-child(2){
    width:22%;
}

td:nth-child(3){
    width:12%;
}

td:nth-child(4){
    width:14%;
}

td:nth-child(5){
    width:14%;
}

td:nth-child(6){
    width:10%;
}

}

</style>
</head>

<body>
<script>

const password = prompt("Enter Password");

if(password !== "0000"){

    alert("Wrong Password");

    document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Access Denied</h2>";

}

</script>

<div class="container">

<h1>G10 Student Enquiry System</h1>

<!-- FORM -->

<div class="form-box">

<div class="grid">

<div>
<label>Student Name *</label>
<input type="text" id="name">
</div>

<div>
<label>Parent Name</label>
<input type="text" id="parentName">
</div>

<div>
<label>Mobile Number *</label>
<input type="text" id="mobile">
</div>

<div>
<label>Class</label>

<select id="studentClass">

<option value="">Select Class</option>

<option>Class 6</option>
<option>Class 7</option>
<option>Class 8</option>
<option>Class 9</option>
<option>Class 10</option>
<option>Class 11</option>
<option>Class 12</option>

<option>IIT-JEE</option>
<option>NEET</option>
<option>Other</option>

</select>

</div>

<div>

<label>Subject</label>

<select id="subject">

<option value="">Select Subject</option>

<option>Physics</option>
<option>Physics + Chemistry</option>
<option>Chemistry</option>
<option>Mathematics</option>
<option>Math + Science</option>
<option>Biology</option>
<option>Science</option>
<option>English</option>
<option>Ecomomics</option>
<option>Social Science</option>

<option>other Subjects</option>

</select>

</div>

<div>

<label>Course Interested</label>

<select id="course">

<option value="">Select Course</option>

<option>Individual Coaching</option>

<option>Home Tuition</option>

<option>Group Coaching</option>

<option>Online Coaching</option>

<option>Dual Coaching</option>

<option>Super Group Coaching</option>

<option>Demo Class</option>

<option>Study Material</option>

<option>Others</option>

</select>

</div>

<div>
<label>School Name</label>
<input type="text" id="school">
</div>

<div>
<label>Date</label>
<input type="date" id="date">
</div>

</div>

<br>

<label>Remarks</label>

<textarea id="remarks" rows="3"></textarea>

<br><br>

<button class="save-btn" onclick="saveEnquiry()">
Save Enquiry
</button>

</div>

<!-- SEARCH -->

<div class="table-box">

<div class="search-box">

<div class="grid">

<div>

<label>Search</label>

<input
type="text"
id="search"
placeholder="Search Name or Mobile"
onkeyup="loadData()">

</div>

<div>

<label>Filter Class</label>

<select id="filterClass" onchange="loadData()">

<option value="">All Classes</option>

<option>Class 6</option>
<option>Class 7</option>
<option>Class 8</option>
<option>Class 9</option>
<option>Class 10</option>
<option>Class 11</option>
<option>Class 12</option>

<option>IIT-JEE</option>
<option>NEET</option>
<option>Other</option>

</select>

</div>

<div>

<label>From Date</label>

<input
type="date"
id="fromDate"
onchange="loadData()">

</div>

<div>

<label>To Date</label>

<input
type="date"
id="toDate"
onchange="loadData()">

</div>

</div>

</div>

<!-- TABLE -->

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>Name</th>

<th>Class</th>
<th>Date</th>
<th>Status</th>
<th>Remarks</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// FIREBASE CONFIG

const firebaseConfig = {

apiKey: "AIzaSyASonAyK1NIfvHXyk8UNMX8ofrSM5cYf7o",

authDomain: "g10-enquery.firebaseapp.com",

projectId: "g10-enquery",

storageBucket: "g10-enquery.firebasestorage.app",

messagingSenderId: "149940630975",

appId: "1:149940630975:web:58f8f785613f7c5b5b5d0a",

measurementId: "G-V4L2PXSXCX"

};


// INITIALIZE FIREBASE

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


// SAVE ENQUIRY
let editingId = null;

window.saveEnquiry = async function(){

const name =
document.getElementById("name").value.trim();

const parentName =
document.getElementById("parentName").value.trim();

const mobile =
document.getElementById("mobile").value.trim();

const studentClass =
document.getElementById("studentClass").value;

const subject =
document.getElementById("subject").value;

const course =
document.getElementById("course").value;

const school =
document.getElementById("school").value.trim();

const date =
document.getElementById("date").value;

const remarks =
document.getElementById("remarks").value.trim();


if(!name || !mobile){

alert("Please fill Student Name and Mobile Number");

return;

}


const enquiryData = {

name,
parentName,
mobile,
studentClass,
subject,
course,
school,
date,
remarks

};


try{

if(editingId){

await updateDoc(doc(db,"enquiries",editingId), enquiryData);

alert("Enquiry Updated Successfully");

editingId = null;

document.querySelector(".save-btn").innerText =
"Save Enquiry";

}
else{

enquiryData.status = "Pending";

enquiryData.createdAt = new Date();

await addDoc(collection(db,"enquiries"), enquiryData);

alert("Enquiry Saved Successfully");

}


// CLEAR FORM

document.getElementById("name").value = "";

document.getElementById("parentName").value = "";

document.getElementById("mobile").value = "";

document.getElementById("studentClass").value = "";

document.getElementById("subject").value = "";

document.getElementById("course").value = "";

document.getElementById("school").value = "";

document.getElementById("date").value = "";

document.getElementById("remarks").value = "";


loadData();

}
catch(error){

console.log(error);

alert("Error Saving Data");

}

}


// LOAD DATA

window.loadData = async function(){

const tbody =
document.getElementById("tableBody");

tbody.innerHTML = "";

const search =
document.getElementById("search")
.value
.toLowerCase();

const filterClass =
document.getElementById("filterClass").value;

const fromDate =
document.getElementById("fromDate").value;

const toDate =
document.getElementById("toDate").value;


const querySnapshot =
await getDocs(collection(db,"enquiries"));


querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();


// SEARCH FILTER

const matchesSearch =

(data.name || "")
.toLowerCase()
.includes(search)

||

(data.mobile || "")
.includes(search);


// CLASS FILTER

const matchesClass =

!filterClass ||

data.studentClass === filterClass;


// DATE FILTER

const matchesFromDate =

!fromDate ||

data.date >= fromDate;

const matchesToDate =

!toDate ||

data.date <= toDate;


// SHOW ROW

if(

matchesSearch &&
matchesClass &&
matchesFromDate &&
matchesToDate

){

tbody.innerHTML += `

<tr>



<td>

${data.name || ""}

${
data.parentName
? `<br><small style="color:#64748b">
Parent: ${data.parentName}
</small>`
: ""
}

${
data.mobile
? `<br><small style="color:#0f172a">
📞 ${data.mobile}
</small>`
: ""
}

</td>



<td>

${data.studentClass || ""}

${
data.subject
? `<br><small style="color:#64748b">
Subject: ${data.subject}
</small>`
: ""
}

${
data.course
? `<br><small style="color:#64748b">
Course: ${data.course}
</small>`
: ""
}

</td>



<td>${data.date || ""}</td>



<td class="${
data.status === 'Enrolled'
? 'status-success'
: data.status === 'Not Enrolled'
? 'status-not'
: 'status-pending'
}">

${data.status || "Pending"}

${
data.enrolDate
? `<br><small>${data.enrolDate}</small>`
: ""
}

</td>

<td>${data.remarks || ""}</td>




<td>

<button
class="edit-btn"
onclick="editEntry(
'${docSnap.id}',
'${(data.name || "").replace(/'/g, "\\'")}',
'${(data.parentName || "").replace(/'/g, "\\'")}',
'${(data.mobile || "").replace(/'/g, "\\'")}',
'${(data.studentClass || "").replace(/'/g, "\\'")}',
'${(data.subject || "").replace(/'/g, "\\'")}',
'${(data.course || "").replace(/'/g, "\\'")}',
'${(data.school || "").replace(/'/g, "\\'")}',
'${(data.date || "").replace(/'/g, "\\'")}',
'${(data.remarks || "").replace(/'/g, "\\'")}'
)">

Edit

</button>

<br>

<button
class="success-btn"
onclick="markEnrolled('${docSnap.id}')">

Enrolled

</button>

<br>

<button
class="not-btn"
onclick="markNotEnrolled('${docSnap.id}')">

Not Enrolled

</button>

<br>

<button
class="delete-btn"
onclick="deleteEntry('${docSnap.id}')">

Delete

</button>

</td>

</tr>

`;

}

});

}






window.editEntry = function(
id,
name,
parentName,
mobile,
studentClass,
subject,
course,
school,
date,
remarks
){

editingId = id;

document.getElementById("name").value = name;

document.getElementById("parentName").value = parentName;

document.getElementById("mobile").value = mobile;

document.getElementById("studentClass").value =
studentClass;

document.getElementById("subject").value = subject;

document.getElementById("course").value = course;

document.getElementById("school").value = school;

document.getElementById("date").value = date;

document.getElementById("remarks").value = remarks;

document.querySelector(".save-btn").innerText =
"Update Enquiry";

window.scrollTo({
top:0,
behavior:"smooth"
});

}
// MARK ENROLLED

window.markEnrolled = async function(id){

const today = new Date();

const enrolDate =

today.getFullYear() + "-" +

String(today.getMonth() + 1).padStart(2,"0") + "-" +

String(today.getDate()).padStart(2,"0");


await updateDoc(doc(db,"enquiries",id),{

status:"Enrolled",
enrolDate: enrolDate

});

loadData();

}


// MARK NOT ENROLLED

window.markNotEnrolled = async function(id){

await updateDoc(doc(db,"enquiries",id),{

status:"Not Enrolled"

});

loadData();

}


// DELETE ENTRY

window.deleteEntry = async function(id){

const confirmDelete =
confirm("Delete this enquiry?");

if(confirmDelete){

await deleteDoc(doc(db,"enquiries",id));

loadData();

}

}


// AUTO LOAD

loadData();

</script>

</body>
</html>
