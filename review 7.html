<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>G10 Educational Platform Reviews</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial;
  background:#f2f2f2;
  margin:0;
  padding:30px;
}

.container{
  width:100%;
  max-width:700px;
  margin:auto;
  background:white;
  padding:50px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* MOBILE FULL SCREEN FIX */
@media (max-width:768px){

  body{
    padding:0;
    margin:0;
  }

  .container{
    width:100vw;        /* 👈 FULL SCREEN WIDTH */
    max-width:100vw;    /* 👈 override 700px */
    margin:0;
    padding:20px 16px;   /* 👈 increase usable space */
    border-radius:0;
    box-shadow:none;
    box-sizing:border-box; /* 👈 IMPORTANT FIX */
  }
}

  h2{
    font-size:20px;
  }

  .review{
    font-size:15px;
  }

  input, textarea, select{
    font-size:15px;
  }

  button{
    font-size:14px;
  }

  .top-area{
    flex-direction:column;
  }

  #roleChart{
    width:100% !important;
    height:auto !important;
  }

  #topReviewBox{
    width:100%;
  }
}



input, textarea, select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:5px;
  font-size:16px;
}

button{
  padding:8px 11px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin:5px 0;
}

/* ✅ SUBMIT BUTTON GREEN */
button.submit-btn{
  background:#28a745 !important;
  font-size:18px;
  padding:14px 20px;
  font-weight:bold;
}

/* ✅ FILTER BUTTONS GRAY */
button.filter-btn{
  background:#6c757d !important;
}

.review{
  background:#fafafa;
  padding:10px;
  margin-top:10px;
  border-left:4px solid #007bff;
  border-radius:5px;
}

.review-header{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:45px;
  height:45px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #007bff;
}

.like-btn{
  margin-top:5px;
  background:#28a745;
}

.floating-stats{
  position:fixed;
  top:10px;
  right:10px;
  background:#007bff;
  color:white;
  padding:10px;
  border-radius:8px;
  z-index:999;
  font-size:14px;
}

.top-area{
  display:flex;
  gap:10px;
  align-items:center;
}

#topReviewBox{
  flex:1;
  background:#fff3cd;
  border-left:6px solid gold;
  padding:10px;
  border-radius:8px;
  max-height:180px;
  overflow:auto;
}

#roleChart{
  width:120px !important;
  height:120px !important;
}



.header-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}

.stats-inline{
  display:flex;
  gap:10px;
  background:#007bff;
  color:white;
  padding:6px 10px;
  border-radius:8px;
  font-size:14px;
}

/* mobile fix */
@media (max-width:768px){
  .header-bar{
    flex-direction:column;
    align-items:flex-start;
  }

  .stats-inline{
    width:100%;
    justify-content:space-between;
  }
}
</style>
</head>

<body>


	 


<div class="container">

<div class="header-bar">
  <h2>⭐ G10EP Reviews</h2>

  <div class="stats-inline">
    <div id="totalReviews">Total: 0</div>
    <div id="avgRating">⭐ 0.0</div>
  </div>
</div>

<div class="top-area">
  <canvas id="roleChart"></canvas>
  <div id="topReviewBox"></div>
</div>

<button class="filter-btn" onclick="setFilter('all')">All Review</button>
<button class="filter-btn" onclick="setFilter('student')">Student Review</button>
<button class="filter-btn" onclick="setFilter('parent')">Parent Review</button>
<button class="filter-btn" onclick="setFilter('teacher')">Teacher Review</button>

<input id="name" placeholder="Name">

<select id="role">
  <option value="student">Student</option>
  <option value="parent">Parent</option>
  <option value="teacher">Teacher</option>
</select>

<textarea id="message" placeholder="Write your review..."></textarea>

<p><b>Profile Photo</b></p>

<button onclick="document.getElementById('cameraInput').click()">📸 Take Photo</button>
<button onclick="document.getElementById('galleryInput').click()">📁 Upload Photo</button>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
<input type="file" id="galleryInput" accept="image/*" style="display:none;">

<!-- Submit button already above this -->

<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">

  <!-- LEFT: SUBMIT BUTTON -->
  <button class="submit-btn" onclick="submitReview()">
    Submit Review
  </button>

  <!-- RIGHT: LOGO -->
  <img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png"
       onclick="toggleAdminPanel()"
       style="width:80px;height:80px;cursor:pointer;border-radius:6px;">

</div>

<!-- ✅ ADMIN PANEL (PUT HERE) -->
<div id="adminPanel" style="display:none;margin:10px 0;padding:10px;background:#eee;border-radius:8px;">

  <input id="adminPass" type="password"
         placeholder="Admin Password"
         style="width:70%;padding:8px;">

  <button onclick="verifyAdmin()">Unlock Admin</button>

  <div id="adminStatus" style="margin-top:5px;color:red;"></div>

</div>

<h3>All Reviews</h3>

<div id="reviews"></div>

<!-- 🔥 PAGINATION AT BOTTOM -->
<div style="display:flex;justify-content:space-between;align-items:center;margin-top:15px;padding:10px 0;border-top:1px solid #ddd;">

  <button onclick="prevPage()">⬅ Prev</button>

  <div id="pageInfo" style="font-weight:bold;"></div>

  <button onclick="nextPage()">Next ➡</button>

</div>

<script>

const dbURL = "https://g10ep-reviews-default-rtdb.firebaseio.com/reviews.json";
const IMGBB_KEY = "de06c0547ba684b42daa90da75d0314a";

let currentFilter = "all";
let showAllTop = false;
let currentPage = 1;
let reviewsPerPage = 5;
let allReviewsData = {};

let isAdmin = false;
const ADMIN_PASSWORD = "781028"; // change this password

function setFilter(t){
  currentFilter = t;
  loadReviews();
}

function getFile(){
  return document.getElementById("cameraInput").files[0] ||
         document.getElementById("galleryInput").files[0];
}

function uploadImage(file){
  let form = new FormData();
  form.append("image", file);

  return fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`,{
    method:"POST",
    body:form
  })
  .then(r=>r.json())
  .then(d=>d.data.url);
}

function loadReviews(){

fetch(dbURL)
.then(r => r.json())
.then(data => {

  // store globally for pagination
  allReviewsData = data;

  updateStats(data);
  showTopReview(data);
  updateChart(data);

  let out = "";

  for(let k in data){
    let r = data[k];

    if(!r.role) r.role = "student";

    if(currentFilter !== "all" && r.role !== currentFilter) continue;

    let stars = "";
    for(let i = 0; i < 5; i++){
      stars += i < r.rating ? "★" : "☆";
    }

    out += `
    <div class="review" id="rev-${k}">
      
      <div class="review-header">
        
        ${r.profileImage
          ? `<img class="avatar" src="${r.profileImage}">`
          : `<div class="avatar" style="
              display:flex;
              align-items:center;
              justify-content:center;
              background:#007bff;
              color:white;
              font-weight:bold;
              font-size:18px;
            ">
              ${r.name ? r.name.charAt(0).toUpperCase() : "?"}
            </div>`
        }

        <div>
          <b style="cursor:pointer;color:blue"
             onclick="document.getElementById('rev-${k}').scrollIntoView({behavior:'smooth'})">
            ${r.name}
          </b>
          (${r.role})<br>
          <small>${r.time}</small>
        </div>
      </div>

      <p>${r.message || ""}</p>

      ${r.adminComment ? `
        <div style="margin-top:8px;background:#d1ffd1;padding:6px;border-radius:5px;">
          🛑 Admin: ${r.adminComment}
        </div>
      ` : ""}

      <div>${stars}</div>

      <button class="like-btn">
        👍 Like (${r.likes || 0})
      </button>

      ${isAdmin ? `
        <div style="margin-top:8px;">
          <input id="cmt-${k}" placeholder="Write admin comment"
            style="width:70%;padding:5px;">
          <button onclick="addComment('${k}')">Reply</button>
        </div>
      ` : ""}
${isAdmin ? `
  <button onclick="editReview('${k}')">✏️ Edit</button>
` : ""}
    </div>`;
  }

  document.getElementById("reviews").innerHTML = out;

});
}

function editReview(id){

  let r = allReviewsData[id]; // get fresh data

  let newName = prompt("Edit Name:", r.name);
  let newMessage = prompt("Edit Message:", r.message);

  if(newName === null || newMessage === null) return;

  fetch(dbURL.replace(".json","/" + id + ".json"), {
    method: "PATCH",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: newName,
      message: newMessage
    })
  }).then(() => {
    alert("✅ Review updated!");
    loadReviews();
  });
}

function showTopReview(data){

  let arr=[];

  for(let k in data){
    let r=data[k];
    if(r.rating) arr.push({...r,id:k});
  }

  arr.sort((a,b)=>b.rating-a.rating);

  let show = showAllTop ? arr : arr.slice(0,3);

  let html = `<b>🏆 Top Reviews</b><br><br>`;

  show.forEach(r=>{

    let stars="";
    for(let i=0;i<5;i++){
      stars += i<r.rating?"★":"☆";
    }

    html+=`
      <div style="margin-bottom:6px;">
        <b style="cursor:pointer;color:blue"
           onclick="document.getElementById('rev-${r.id}').scrollIntoView({behavior:'smooth'})">
          ${r.name}
        </b>
        (${r.role||"student"})<br>
        ${stars}
      </div>
    `;
  });

  html+=`
    <button onclick="toggleTop()">
      ${showAllTop ? "Hide" : "See More"}
    </button>
  `;

  document.getElementById("topReviewBox").innerHTML=html;
}

function toggleTop(){
  showAllTop=!showAllTop;
  loadReviews();
}

let chart;

function updateChart(data){

  let s=0,p=0,t=0;

  for(let k in data){
    let r=data[k];
    if(!r.role) r.role="student";

    if(r.role==="student") s++;
    else if(r.role==="parent") p++;
    else t++;
  }

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("roleChart"),{
    type:"pie",
    data:{
      labels:["Student","Parent","Teacher"],
      datasets:[{
        data:[s,p,t],
        backgroundColor:["#4CAF50","#FF9800","#2196F3"]
      }]
    }
  });
}

function updateStats(data){

  let total=0,sum=0,count=0;

  for(let k in data){
    let r=data[k];
    total++;
    if(r.rating){
      sum+=r.rating;
      count++;
    }
  }

  document.getElementById("totalReviews").innerText="Total: "+total;
  document.getElementById("avgRating").innerText="⭐ "+(count?(sum/count).toFixed(1):0);
}

function submitReview(){

  let name=document.getElementById("name").value;
  let message=document.getElementById("message").value;
  let role=document.getElementById("role").value;
  let file=getFile();

  if(!name || !message){
    alert("Fill all fields");
    return;
  }

  if(file){
    uploadImage(file).then(url=>{
      saveReview(name,message,role,url);
    });
  }else{
    saveReview(name,message,role,"");
  }
}

function saveReview(name,message,role,img){

  fetch(dbURL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name,
      message,
      role,
      rating:0,
      likes:0,
      profileImage:img,
      time:new Date().toLocaleString()
    })
  });

  alert("Submitted!");
}

setInterval(loadReviews,3000);
loadReviews();



function verifyAdmin(){
  let pass = document.getElementById("adminPass").value;

  if(pass === ADMIN_PASSWORD){
    isAdmin = true;

    document.getElementById("adminStatus").innerHTML =
      "✅ Admin Mode Activated";

    document.getElementById("adminPanel").style.display = "none";

    // 🔥 IMPORTANT: refresh current page view
    renderPage();

  } else {
    isAdmin = false;

    document.getElementById("adminStatus").innerHTML =
      "❌ Wrong Password";
  }
}


function addComment(id){

  let text = document.getElementById("cmt-" + id).value;

  if(!text) return;

  fetch(dbURL.replace(".json","/" + id + ".json"),{
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      adminComment:text
    })
  });

  alert("Comment added!");
}


function toggleAdminPanel(){
  let panel = document.getElementById("adminPanel");

  if(panel.style.display === "none"){
    panel.style.display = "block";
  }else{
    panel.style.display = "none";
  }
}


function renderPage(){

  let data = allReviewsData;

  let filtered = [];

  for(let k in data){
    let r = data[k];

    if(!r.role) r.role="student";

    if(currentFilter!=="all" && r.role!==currentFilter) continue;

    filtered.push({id:k, ...r});
  }

  let totalPages = Math.ceil(filtered.length / reviewsPerPage);

  if(currentPage > totalPages) currentPage = totalPages || 1;

  let start = (currentPage-1)*reviewsPerPage;
  let end = start + reviewsPerPage;

  let pageItems = filtered.slice(start,end);

  let out="";

  pageItems.forEach(r=>{

    let stars="";
    for(let i=0;i<5;i++){
      stars += i<r.rating?"★":"☆";
    }

    out+=`
    <div class="review" id="rev-${r.id}">
      <div class="review-header">
        ${r.profileImage
        ? `<img class="avatar" src="${r.profileImage}">`
        : `<div class="avatar" style="display:flex;align-items:center;justify-content:center;background:#007bff;color:white;font-weight:bold;font-size:18px;">
            ${r.name ? r.name.charAt(0).toUpperCase() : "?"}
          </div>`
        }

        <div>
          <b style="cursor:pointer;color:blue"
             onclick="document.getElementById('rev-${r.id}').scrollIntoView({behavior:'smooth'})">
            ${r.name}
          </b>
          (${r.role})<br>
          <small>${r.time}</small>
        </div>
      </div>

      <p>${r.message || ""}</p>

      <div>${stars}</div>

      <button class="like-btn">
        👍 Like (${r.likes||0})
      </button>
    </div>`;
  });

  document.getElementById("reviews").innerHTML = out;

  // update page info
  document.getElementById("pageInfo").innerText =
    `Page ${currentPage} of ${totalPages || 1}`;
}

function nextPage(){
  currentPage++;
  renderPage();
}

function prevPage(){
  if(currentPage > 1){
    currentPage--;
    renderPage();
  }
}
</script>

</body>
</html>
